<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Progress</title>

    <link rel="stylesheet" href="testcs.css">
</head>
<body>

    <div class="circle-progress">
        <div class="circle-progress_outer">
            <div class="circle-progress_inner">
                <div class="circle-progress_stat">
                    <strong id="circleProgressAmount">50%</strong>
                    <span>Used</span>
                </div>
            </div>
        </div>

        <svg width="400px" height="400px">
            <circle cx="200" cy="200" r="185"></circle>
        </svg>
    </div>

</body>
</html>
